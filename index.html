<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой сайт</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <span class="corner corner-tl">portfolio.dev</span>
  <span class="corner corner-br">2026 ©</span>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <p class="label">Разработчик & дизайнер</p>
    <h1>Создаю вещи,<br>которые <em>работают</em><br>и выглядят</h1>
    <p class="desc">Практика — это путь. Здесь начинается что-то настоящее. Каждая строка кода — шаг вперёд.</p>
    <div class="actions">
      <button class="btn-primary">Посмотреть работы</button>
      <button class="btn-ghost">Связаться</button>
    </div>
    <div class="divider"></div>
    <div class="meta">
      <div class="meta-item">
        <span class="meta-num">12</span>
        <span class="meta-label">Проектов</span>
      </div>
      <div class="meta-item">
        <span class="meta-num">3+</span>
        <span class="meta-label">Года опыта</span>
      </div>
      <div class="meta-item">
        <span class="meta-num">∞</span>
        <span class="meta-label">Идей</span>
      </div>
    </div>
  </div>

</body>
</html>
